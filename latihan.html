<!DOCTYPE html>
<html lang="ms">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bijak Pecahan | Latihan</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Press Start 2P", cursive;
        background: url("image/background.jpg") no-repeat center center fixed;
        background-size: cover;
        color: white;
        overflow: hidden;
        height: 100vh;
      }

      /* Stars animation */
      .stars {
        position: fixed;
        inset: 0;
        z-index: -1;
        overflow: hidden;
      }
      .star {
        position: absolute;
        width: 5px;
        height: 5px;
        background: rgba(205, 168, 5, 0.529);
        border-radius: 50%;
        animation: blink 2s infinite ease-in-out;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 0.2;
        }
        50% {
          opacity: 1;
        }
      }

      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 30px;
        background: rgba(10, 10, 40, 0.85);
        position: fixed;
        width: 100%;
        top: 0;
        z-index: 100;
      }

      .nav-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .nav-left img {
        width: 250px;
        height: auto;
        max-height: 80px;
        display: block;
      }
      .nav-title {
        font-size: 12px;
        background: #00aaff;
        padding: 6px 14px;
        border-radius: 20px;
      }

      .nav-links {
        display: flex;
        gap: 20px;
      }

      .nav-links a {
        color: white;
        text-decoration: none;
        font-size: 13px;
      }

      .nav-links a:hover,
      .nav-links a.active {
        color: #ffd700;
        text-shadow: 0 0 10px #ffd700;
      }

      .hamburger {
        display: none;
        flex-direction: column;
        justify-content: space-between;
        width: 24px;
        height: 18px;
        cursor: pointer;
      }

      .hamburger div {
        background-color: white;
        height: 3px;
        border-radius: 2px;
      }

      .content {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding-top: 60px;
      }

      h1 {
        color: #25ff6e;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
        font-size: 38px;
        margin-bottom: 25px;
      }

      .section {
        background: rgba(10, 10, 40, 0.75);
        border-radius: 20px;
        padding: 10px 20px 15px 20px;
        margin: 10px 0;
        width: 80%;
        max-width: 700px;
      }

      .section h2 {
        font-size: 12px;
        color: #07dd4e;
        margin-bottom: 10px;
      }

      .buttons {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 12px;
      }

      .buttons button {
        background-color: #2ecc70e0;
        border: none;
        padding: 12px 18px;
        border-radius: 10px;
        color: white;
        font-size: 15px;
        font-family: "Press Start 2P", cursive;
        cursor: pointer;
        box-shadow: 0 0 10px #2ecc71;
        transition: 0.3s ease;
      }

      .buttons button:hover {
        transform: scale(1.05);
        box-shadow: 0 0 6px #16ff6f73, 0 0 60px #16ff6f7a;
      }

      @media (max-width: 768px) {
        .hamburger {
          display: flex;
        }

        .nav-links {
          display: none;
          flex-direction: column;
          background: rgba(10, 10, 40, 0.95);
          width: 100%;
          position: absolute;
          top: 65px;
          left: 0;
          text-align: center;
          padding: 15px 0;
          animation: slideDown 0.3s ease forwards;
        }

        .nav-links.show {
          display: flex;
        }

        .nav-links a {
          padding: 10px 0;
          display: block;
          font-size: 10px;
        }

        @keyframes slideDown {
          from {
            opacity: 0;
            transform: translateY(-10px);
          }

          to {
            opacity: 1;
            transform: translateY(0);
          }
        }

        h1 {
          font-size: 14px;
          margin-bottom: 20px;
        }

        .section {
          width: 90%;
          padding: 12px;
        }

        .buttons button {
          width: 100%;
          font-size: 10px;
        }
      }

      @media (max-width: 480px) {
        .nav-title {
          font-size: 10px;
          padding: 5px 10px;
        }

        .nav-left img {
          width: 38px;
          height: 38px;
        }

        .section h2 {
          font-size: 10px;
        }
      }
      /* Avatar Chat Box */
      .avatar-chat-container {
        position: fixed;
        bottom: 30px;
        left: 30px;
        z-index: 50;
        display: flex;
        align-items: flex-end;
        gap: 15px;
        animation: slideInLeft 0.5s ease-out;
      }

      @keyframes slideInLeft {
        from {
          transform: translateX(-100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      .avatar-3d-wrapper {
        width: 120px;
        height: 120px;
        background: rgba(10, 10, 40, 0.7);
        border-radius: 50%;
        border: 3px solid #ffd700;
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        overflow: hidden;
        position: relative;
      }

      .chat-bubble {
        background: rgba(255, 255, 255, 0.95);
        color: #333;
        padding: 15px 20px;
        border-radius: 20px 20px 20px 5px;
        max-width: 280px;
        font-size: 9px;
        line-height: 1.5;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        position: relative;
        animation: bounce 0.6s ease-out;
      }

      @keyframes bounce {
        0% {
          transform: scale(0.8) translateY(20px);
          opacity: 0;
        }
        50% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(1) translateY(0);
          opacity: 1;
        }
      }

      .chat-bubble::before {
        content: "";
        position: absolute;
        bottom: 10px;
        left: -10px;
        width: 0;
        height: 0;
        border-style: solid;
        border-width: 0 15px 15px 0;
        border-color: transparent rgba(255, 255, 255, 0.95) transparent
          transparent;
      }

      .chat-bubble strong {
        color: #ff2d2d;
        display: block;
        margin-bottom: 5px;
      }

      #three-container {
        width: 100%;
        height: 100%;
        position: absolute;
        inset: 0;
      }
      .btn-home {
        background: linear-gradient(45deg, #2fba00, #95ff00);
        color: #fffbea;
        padding: 12px 14px;
        border-radius: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        font-size: 20px;
        font-family: "Press Start 2P", cursive;
        box-shadow: 0 0 20px rgba(94, 255, 0, 0.9);
        position: fixed;
        bottom: 10px;
        right: 30px;
        z-index: 1100;
        transition: all 0.3s ease-in-out;
        border: 2px solid #c2ffa3;
        text-shadow: 0 0 5px #dfffc1;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .avatar-chat-container {
          bottom: 15px;
          left: 15px;
          gap: 10px;
        }
        .avatar-3d-wrapper {
          width: 90px;
          height: 90px;
          border-width: 2px;
        }
        .chat-bubble {
          max-width: 220px;
          font-size: 8px;
          padding: 12px 16px;
        }
      }

      @media (max-width: 480px) {
        .avatar-chat-container {
          bottom: 10px;
          left: 10px;
          gap: 8px;
        }
        .avatar-3d-wrapper {
          width: 70px;
          height: 70px;
        }
        .chat-bubble {
          max-width: 180px;
          font-size: 7px;
          padding: 10px 12px;
          border-radius: 15px 15px 15px 3px;
        }
        .chat-bubble::before {
          border-width: 0 10px 10px 0;
        }
      }

      @media (max-width: 380px) {
        .avatar-3d-wrapper {
          width: 60px;
          height: 60px;
        }
        .chat-bubble {
          max-width: 150px;
          font-size: 6px;
          padding: 8px 10px;
        }
      }
    </style>
  </head>

  <body>
    <div class="stars" id="stars"></div>

    <div class="navbar">
      <div class="nav-left">
        <img src="image/newLogo.png" alt="Logo" />
      </div>

      <div class="hamburger" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
      </div>

      <div class="nav-links" id="navLinks">
        <a href="home.html">🏠 HALAMAN UTAMA</a>
        <a href="pelajaran.html">✏️ PELAJARAN</a>
        <a href="latihan.html" class="active">🗒️ LATIHAN</a>
      </div>
    </div>
    <div class="avatar-chat-container">
      <div class="avatar-3d-wrapper">
        <div id="three-container"></div>
      </div>
      <div class="chat-bubble">
        <strong>Jom Buat Latihan!</strong>
        Pilih Latihan yang anda minat!
      </div>
    </div>
    <div class="content">
      <h1>JOM BUAT LATIHAN!</h1>

      <div class="section">
        <h2>LATIHAN</h2>
        <div class="buttons">
          <a href="pilihan.html"><button>SOALAN ANEKA PILIHAN</button></a>
          <a href="refleksi.html"><button>SOALAN REFLEKSI</button></a>
        </div>
      </div>

      <div class="section">
        <h2>UJIAN SUMATIF</h2>
        <div class="buttons">
          <a href="ujian.html"><button>UJIAN PKSK</button></a>
        </div>
      </div>

      <div class="section">
        <h2>MAIN & CABAR</h2>
        <div class="buttons">
          <a href="seret.html"><button>SERET & LEPAS</button></a>
          <a href="ingat.html"><button>INGATAN</button></a>
          <a href="harian.html"><button>AKTIVITI HARIAN</button></a>
        </div>
      </div>
    </div>
    <a href="latihan.html" class="btn-home" data-tooltip="Halaman Latihan">
      🏠
    </a>

    <!-- hover sound asset -->
    <audio id="hoverSound" preload="auto" style="display: none">
      <source src="sound/hover.mp3" type="audio/mpeg" />
    </audio>

    <script>
      // Stars background
      const starsContainer = document.getElementById("stars");
      for (let i = 0; i < 100; i++) {
        const s = document.createElement("div");
        s.classList.add("star");
        s.style.left = Math.random() * 100 + "%";
        s.style.top = Math.random() * 100 + "%";
        s.style.animationDelay = Math.random() * 2 + "s";
        starsContainer.appendChild(s);
      }

      function toggleMenu() {
        document.getElementById("navLinks").classList.toggle("show");
      }

      (function () {
        const hoverSoundEl = document.getElementById("hoverSound");
        if (!hoverSoundEl) return;
        hoverSoundEl.volume = 1;
        let lastPlay = 0;

        function playHover() {
          const now = Date.now();
          if (now - lastPlay < 80) return; // debounce
          lastPlay = now;
          try {
            hoverSoundEl.currentTime = 0;
            hoverSoundEl.play().catch(() => {});
          } catch (e) {}
        }

        const selector = [".buttons button", "button"].join(",");

        document.querySelectorAll(selector).forEach((el) => {
          el.addEventListener("pointerenter", playHover, { passive: true });
          el.addEventListener("focus", playHover, { passive: true });
        });

        // Unlock audio on first user gesture for touch devices
        function unlockOnce() {
          try {
            hoverSoundEl.play().catch(() => {});
          } catch (e) {}
          document.removeEventListener("pointerdown", unlockOnce);
        }
        document.addEventListener("pointerdown", unlockOnce, {
          once: true,
          passive: true,
        });
      })();
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module">
      import * as THREE from "three";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

      const container = document.getElementById("three-container");

      // Scene setup
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(
        50,
        1, // Square aspect ratio for circular container
        0.1,
        1000
      );
      camera.position.set(0, 0.5, 2.0);

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true,
      });
      renderer.setSize(120, 120);
      renderer.setPixelRatio(window.devicePixelRatio);
      container.appendChild(renderer.domElement);

      // Lighting
      scene.add(new THREE.AmbientLight(0xffffff, 1.2));
      const light = new THREE.DirectionalLight(0xffffff, 1.5);
      light.position.set(3, 5, 3);
      scene.add(light);

      // Load GLB model
      const loader = new GLTFLoader();
      let model, mixer;
      const clock = new THREE.Clock();
      window.addEventListener("load", () => {
        const welcomeSound = new Audio("sound/latihan.wav");
        welcomeSound.volume = 0.8;
        welcomeSound.play().catch((e) => {
          console.log("Autoplay blocked, waiting for user interaction:", e);
          // If autoplay is blocked, play on first user interaction
          document.body.addEventListener(
            "click",
            () => {
              welcomeSound
                .play()
                .catch((err) => console.log("Sound play error:", err));
            },
            { once: true }
          );
        });
      });
      loader.load(
        "avatar/kai.glb",
        (gltf) => {
          model = gltf.scene;
          model.scale.set(1.5, 1.85, 1.85);
          model.position.set(0, -0.6, 0);
          model.rotation.y = 0.5; // Slight angle toward viewer

          scene.add(model);

          if (gltf.animations.length > 1) {
            // Make sure at least 2 animations exist
            mixer = new THREE.AnimationMixer(model);
            const secondAction = mixer.clipAction(gltf.animations[3]); // Index 1 = second animation
            secondAction.play();
            secondAction.timeScale = 1; // Adjust speed if needed
          }

          animate();
        },
        undefined,
        (error) => console.error("Error loading GLB:", error)
      );

      // Animate
      function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        if (mixer) mixer.update(delta);
        renderer.render(scene, camera);
      }

      // Handle window resize for responsive avatar
      function updateAvatarSize() {
        let size = 120;
        if (window.innerWidth < 380) {
          size = 60;
        } else if (window.innerWidth < 480) {
          size = 70;
        } else if (window.innerWidth < 768) {
          size = 90;
        }
        renderer.setSize(size, size);
        camera.aspect = 1;
        camera.updateProjectionMatrix();
      }

      window.addEventListener("resize", updateAvatarSize);
      updateAvatarSize(); // Initial call
    </script>
  </body>
</html>
