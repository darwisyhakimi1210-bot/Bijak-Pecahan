<!DOCTYPE html>
<html lang="ms">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bijak Pecahan | Halaman Utama</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        font-family: "Press Start 2P", cursive;
        color: white;
        background: url("image/background.jpg") no-repeat center center fixed;
        background-size: cover;
        text-align: center;
      }

      .stars {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
      }
      .star {
        position: absolute;
        width: 5px;
        height: 5px;
        background: rgba(205, 168, 5, 0.529);
        border-radius: 50%;
        animation: blink 2s infinite ease-in-out;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 0.2;
        }
        50% {
          opacity: 1;
        }
      }

      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 30px;
        background: rgba(10, 10, 40, 0.85);
        position: fixed;
        width: 100%;
        top: 0;
        z-index: 100;
        box-sizing: border-box;
      }
      .nav-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .nav-left img {
        width: 250px;
        height: auto;
        max-height: 80px;
        display: block;
      }
      .nav-title {
        font-size: 14px;
        background: #00aaff;
        padding: 6px 12px;
        border-radius: 18px;
        white-space: nowrap;
      }
      .hamburger {
        display: none;
        flex-direction: column;
        gap: 5px;
        width: 24px;
        height: 18px;
        cursor: pointer;
      }
      .hamburger div {
        background-color: #fff;
        height: 3px;
        border-radius: 2px;
      }
      .nav-links {
        display: flex;
        gap: 20px;
      }
      .nav-links a {
        color: white;
        text-decoration: none;
        font-size: 13px;
      }

      .nav-links a:hover,
      .nav-links a.active {
        color: #ffd700;
        text-shadow: 0 0 8px #ffd700;
      }

      .main-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        padding-top: 60px;
        box-sizing: border-box;
        position: relative;
        z-index: 1;
      }
      .main-content h2 {
        font-size: 18px;
        margin: 0;
      }
      .main-content h1 {
        font-size: 30px;
        color: #ffd700;
        margin: 15px 0;
      }

      .btn-mula {
        display: inline-block;
        margin-top: 20px;
        background: #ff2d2d;
        color: white;
        padding: 14px 40px;
        border-radius: 6px;
        text-decoration: none;
        font-size: 12px;
        box-shadow: 0 0 20px #ff2d2d;
        animation: glow 0.8s infinite alternate;
      }
      @keyframes glow {
        from {
          box-shadow: 0 0 5px #ff2d2d;
        }
        to {
          box-shadow: 0 0 25px #ff5c5c, 0 0 40px #ff2d2d;
        }
      }

      .info-box {
        margin-top: 40px;
        background: rgba(0, 120, 255, 0.6);
        padding: 20px 30px;
        border-radius: 20px;
        width: 80%;
        max-width: 580px;
        font-size: 15px;
        line-height: 1.6;
      }
      .info-box span.red {
        color: #ff4a4a;
      }

      .avatar-chat-container {
        position: fixed;
        bottom: 30px;
        left: 30px;
        z-index: 50;
        display: flex;
        align-items: flex-end;
        gap: 15px;
        animation: slideInLeft 0.5s ease-out;
      }

      @keyframes slideInLeft {
        from {
          transform: translateX(-100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      .avatar-3d-wrapper {
        width: 120px;
        height: 120px;
        background: rgba(10, 10, 40, 0.7);
        border-radius: 50%;
        border: 3px solid #ffd700;
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        overflow: hidden;
        position: relative;
      }

      .chat-bubble {
        background: rgba(255, 255, 255, 0.95);
        color: #333;
        padding: 15px 20px;
        border-radius: 20px 20px 20px 5px;
        max-width: 280px;
        font-size: 9px;
        line-height: 1.5;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        position: relative;
        animation: bounce 0.6s ease-out;
      }

      @keyframes bounce {
        0% {
          transform: scale(0.8) translateY(20px);
          opacity: 0;
        }
        50% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(1) translateY(0);
          opacity: 1;
        }
      }

      .chat-bubble::before {
        content: "";
        position: absolute;
        bottom: 10px;
        left: -10px;
        width: 0;
        height: 0;
        border-style: solid;
        border-width: 0 15px 15px 0;
        border-color: transparent rgba(255, 255, 255, 0.95) transparent
          transparent;
      }

      .chat-bubble strong {
        color: #ff2d2d;
        display: block;
        margin-bottom: 5px;
      }

      /* 3D container for avatar */
      #three-container {
        width: 100%;
        height: 100%;
        position: absolute;
        inset: 0;
      }

      @media (max-width: 768px) {
        .avatar-chat-container {
          bottom: 15px;
          left: 15px;
          gap: 10px;
        }
        .avatar-3d-wrapper {
          width: 90px;
          height: 90px;
          border-width: 2px;
        }
        .chat-bubble {
          max-width: 220px;
          font-size: 8px;
          padding: 12px 16px;
        }
        .main-content {
          padding: 60px 20px 150px 20px;
        }
        .info-box {
          width: 85%;
          margin-bottom: 20px;
        }
      }

      @media (max-width: 480px) {
        .nav-title {
          font-size: 10px;
          padding: 5px 10px;
        }
        .nav-left img {
          width: 38px;
          height: 38px;
        }
        .main-content h1 {
          font-size: 16px;
        }
        .main-content h2 {
          font-size: 14px;
        }
        .btn-mula {
          padding: 10px 30px;
          font-size: 10px;
        }
        .info-box {
          font-size: 8px;
          width: 90%;
          padding: 15px 20px;
        }
        .avatar-chat-container {
          bottom: 10px;
          left: 10px;
          gap: 8px;
        }
        .avatar-3d-wrapper {
          width: 70px;
          height: 70px;
        }
        .chat-bubble {
          max-width: 180px;
          font-size: 7px;
          padding: 10px 12px;
          border-radius: 15px 15px 15px 3px;
        }
        .chat-bubble::before {
          border-width: 0 10px 10px 0;
        }
      }

      @media (max-width: 380px) {
        .avatar-3d-wrapper {
          width: 60px;
          height: 60px;
        }
        .chat-bubble {
          max-width: 150px;
          font-size: 6px;
          padding: 8px 10px;
        }
        .main-content h1 {
          font-size: 14px;
        }
        .main-content h2 {
          font-size: 12px;
        }
      }

      /* Mobile */
      @media (max-width: 900px) {
        .hamburger {
          display: flex;
        }
        .nav-links {
          display: none;
        }
        .nav-links.show {
          display: flex;
          flex-direction: column;
          gap: 10px;
          position: fixed;
          top: 64px;
          right: 12px;
          background: rgba(10, 10, 40, 0.98);
          padding: 12px;
          border-radius: 10px;
          width: calc(100% - 36px);
          max-width: 360px;
          box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
          z-index: 1200;
        }
      }
    </style>
  </head>

  <body>
    <div class="stars" id="stars"></div>

    <div class="navbar">
      <div class="nav-left">
        <img src="image/newLogo.png" alt="Logo" />
      </div>

      <div class="hamburger" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
      </div>

      <div class="nav-links" id="navLinks">
        <a href="home.html" class="active">🏠 HALAMAN UTAMA</a>
        <a href="pelajaran.html">✏️ PELAJARAN</a>
        <a href="latihan.html">🗒️ LATIHAN</a>
      </div>
    </div>

    <!-- Avatar Chat Box -->
    <div class="avatar-chat-container">
      <div class="avatar-3d-wrapper">
        <div id="three-container"></div>
      </div>
      <div class="chat-bubble">
        <strong>Hai! Saya Mr P!</strong>
        Selamat Datang Ke Bijak Pecahan!
      </div>
    </div>

    <div class="main-content">
      <h2>SELAMAT DATANG KE</h2>
      <h1>"BIJAK PECAHAN"</h1>
      <a href="pelajaran.html" class="btn-mula">MULA</a>
      <div class="info-box">
        SUSAH UNTUK BELAJAR PECAHAN?<br />
        <span>TIADA</span> <span class="red">ALASAN</span> <span>LAGI!</span>
      </div>
    </div>

    <!-- hover sound asset -->
    <audio id="hoverSound" preload="auto" style="display: none">
      <source src="sound/hover.mp3" type="audio/mpeg" />
    </audio>

    <!-- background sound asset -->
    <audio id="backgroundSound" preload="auto" loop style="display: none">
      <source src="sound/background.mp3" type="audio/mpeg" />
    </audio>

    <script>
      (function () {
        const hoverSoundEl = document.getElementById("hoverSound");
        const backgroundSoundEl = document.getElementById("backgroundSound");
        if (!hoverSoundEl || !backgroundSoundEl) return;
        hoverSoundEl.volume = 1;
        backgroundSoundEl.volume = 0.05; // Lower volume for background
        let lastPlay = 0;

        function playHover() {
          const now = Date.now();
          if (now - lastPlay < 80) return; // debounce to avoid rapid retrigger
          lastPlay = now;
          try {
            hoverSoundEl.currentTime = 0;
            hoverSoundEl.play().catch(() => {});
          } catch (e) {}
        }

        // Elements to attach hover sound to (adjust selectors as needed)
        const selector = [".btn-mula"].join(",");

        document.querySelectorAll(selector).forEach((el) => {
          el.addEventListener("pointerenter", playHover, { passive: true });
          el.addEventListener("focus", playHover, { passive: true });
        });

        // Try to play background sound on page load
        backgroundSoundEl.play().catch((e) => {
          console.log(
            "Background autoplay blocked, waiting for user interaction:",
            e
          );
          // If autoplay is blocked, play on first user interaction
          document.body.addEventListener(
            "click",
            () => {
              backgroundSoundEl
                .play()
                .catch((err) =>
                  console.log("Background sound play error:", err)
                );
            },
            { once: true }
          );
        });

        // Unlock audio on first user gesture for touch devices
        function unlockOnce() {
          try {
            hoverSoundEl.play().catch(() => {});
          } catch (e) {}
          document.removeEventListener("pointerdown", unlockOnce);
        }
        document.addEventListener("pointerdown", unlockOnce, {
          once: true,
          passive: true,
        });
      })();
    </script>

    <script>
      // Stars
      const starsContainer = document.getElementById("stars");
      for (let i = 0; i < 100; i++) {
        const s = document.createElement("div");
        s.classList.add("star");
        s.style.left = Math.random() * 100 + "%";
        s.style.top = Math.random() * 100 + "%";
        s.style.animationDelay = Math.random() * 2 + "s";
        starsContainer.appendChild(s);
      }
      function toggleMenu() {
        document.getElementById("navLinks").classList.toggle("show");
      }
    </script>

    <!-- ✅ Import Map for Three.js -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module">
      import * as THREE from "three";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

      const container = document.getElementById("three-container");

      // Scene setup
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(
        50,
        1, // Square aspect ratio for circular container
        0.1,
        1000
      );
      camera.position.set(0, 0.5, 2.0);

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true,
      });
      renderer.setSize(120, 120);
      renderer.setPixelRatio(window.devicePixelRatio);
      container.appendChild(renderer.domElement);

      // Lighting
      scene.add(new THREE.AmbientLight(0xffffff, 1.2));
      const light = new THREE.DirectionalLight(0xffffff, 1.5);
      light.position.set(3, 5, 3);
      scene.add(light);

      // Load GLB model
      const loader = new GLTFLoader();
      let model, mixer;
      const clock = new THREE.Clock();
      window.addEventListener("load", () => {
        const welcomeSound = new Audio("sound/welcome.wav");
        welcomeSound.volume = 1;
        welcomeSound.play().catch((e) => {
          console.log("Autoplay blocked, waiting for user interaction:", e);
          // If autoplay is blocked, play on first user interaction
          document.body.addEventListener(
            "click",
            () => {
              welcomeSound
                .play()
                .catch((err) => console.log("Sound play error:", err));
            },
            { once: true }
          );
        });
      });
      loader.load(
        "avatar/kai.glb",
        (gltf) => {
          model = gltf.scene;
          model.scale.set(1.5, 1.85, 1.85);
          model.position.set(0, -0.6, 0);
          model.rotation.y = -0.1; // Slight angle toward viewer

          scene.add(model);

          if (gltf.animations.length > 1) {
            // Make sure at least 2 animations exist
            mixer = new THREE.AnimationMixer(model);
            const secondAction = mixer.clipAction(gltf.animations[1]); // Index 1 = second animation
            secondAction.play();
            secondAction.timeScale = 1; // Adjust speed if needed
          }

          animate();
        },
        undefined,
        (error) => console.error("Error loading GLB:", error)
      );

      // Animate
      function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        if (mixer) mixer.update(delta);
        renderer.render(scene, camera);
      }

      // Handle window resize for responsive avatar
      function updateAvatarSize() {
        let size = 120;
        if (window.innerWidth < 380) {
          size = 60;
        } else if (window.innerWidth < 480) {
          size = 70;
        } else if (window.innerWidth < 768) {
          size = 90;
        }
        renderer.setSize(size, size);
        camera.aspect = 1;
        camera.updateProjectionMatrix();
      }

      window.addEventListener("resize", updateAvatarSize);
      updateAvatarSize(); // Initial call
    </script>
  </body>
</html>
